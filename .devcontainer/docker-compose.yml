# version: "3.9"

services:
  # ================================================================
  # 🧠 Devcontainer (VS Code attaches here)
  # ================================================================
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: ai-devcontainer
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    command: sleep infinity
    depends_on:
      - ollama
      - litellm

    environment:
      OLLAMA_ENDPOINT: http://ollama:11434
      LITELLM_ENDPOINT: http://litellm:4000

    networks:
      - ai-net

  # ================================================================
  # 🦙 Ollama
  # ================================================================
  ollama:
    build:
      context: ../ollama-service
      dockerfile: Dockerfile
      args:
        OLLAMA_IMAGE: ${OLLAMA_IMAGE:-ollama/ollama:latest}

    container_name: ollama

    ports:
      - "11434:11434" # optional (host access)

    volumes:
      - ollama-models:/root/.ollama/models

    environment:
      OLLAMA_HOST: 0.0.0.0
      DEFAULT_MODEL: ${DEFAULT_MODEL:-tinyllama}
      EXTRA_MODELS: ${EXTRA_MODELS:-}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

    networks:
      - ai-net

  # ================================================================
  # 🔀 LiteLLM
  # ================================================================
  litellm:
    build:
      context: ../litellm-service
      dockerfile: Dockerfile

    container_name: litellm

    ports:
      - "4000:4000"

    depends_on:
      - ollama

    environment:
      LITELLM_PORT: 4000
      LITELLM_CONFIG: /app/config.yaml
      OLLAMA_BASE_URL: http://ollama:11434
      ACTIVE_MODEL: ${ACTIVE_MODEL:-fast}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

    networks:
      - ai-net

# ================================================================
# 💾 Volumes
# ================================================================
volumes:
  ollama-models:

# ================================================================
# 🌐 Network
# ================================================================
networks:
  ai-net:
    driver: bridge