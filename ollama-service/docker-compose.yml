###################################################################
# docker-compose.yml — Ollama Service Stack
#
# TWO BUILD MODES (set OLLAMA_IMAGE in .env or environment):
#
#   Full (default) — ~4GB, includes CUDA libraries
#     docker compose up --build
#
#   Lightweight — ~70MB, CPU-only, no CUDA
#     OLLAMA_IMAGE=alpine/ollama:latest docker compose up --build
#     or set in ollama-service/.env:
#       OLLAMA_IMAGE=alpine/ollama:latest
#
###################################################################

services:

  # ================================================================
  # 🦙 Ollama LLM Service
  # ================================================================
  ollama:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Switch image via env var — no Dockerfile editing needed!
        # full:        OLLAMA_IMAGE=ollama/ollama:latest  (default)
        # lightweight: OLLAMA_IMAGE=alpine/ollama:latest
        OLLAMA_IMAGE: ${OLLAMA_IMAGE:-ollama/ollama:latest}

    container_name: ollama

    ports:
      - "${OLLAMA_PORT:-11434}:11434"

    volumes:
      # ---- Persist models across container rebuilds ----
      # Models survive: docker compose down + docker compose up --build
      # Only lost with: docker compose down -v
      - ollama-models:/root/.ollama/models

    environment:
      # ---- Server config ----
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/root/.ollama/models

      # ---- Model config ----
      - DEFAULT_MODEL=${DEFAULT_MODEL:-tinyllama}
      - EXTRA_MODELS=${EXTRA_MODELS:-}

      # ---- Startup config ----
      - OLLAMA_STARTUP_WAIT=${OLLAMA_STARTUP_WAIT:-60}

      # ---- Performance tuning ----
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-0}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-300}

    restart: unless-stopped

    # ---- Resource limits (tuned for Y510P 8GB RAM) ----
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-4g}
        reservations:
          memory: ${OLLAMA_MEMORY_RESERVE:-1g}

    # Healthcheck verifies tinyllama is actually loaded
    # not just that the server is up
    healthcheck:
      test: >
        CMD sh -c "curl -sf http://localhost:11434/api/tags
        | grep -q tinyllama"
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 180s

    networks:
      - ollama-net

  # ================================================================
  # 🧪 Model Validation (one-shot — exits after test)
  # ================================================================
  ollama-test:
    image: curlimages/curl:latest
    container_name: ollama-test
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ollama-net
    entrypoint: >
      sh -c "
        echo '🧪 Testing Ollama API...' &&
        echo '' &&
        echo '1️⃣  Tags endpoint:' &&
        curl -sf http://ollama:11434/api/tags | head -c 300 &&
        echo '' &&
        echo '' &&
        echo '2️⃣  Generate (tinyllama):' &&
        curl -sf http://ollama:11434/api/generate
          -d '{\"model\":\"tinyllama\",\"prompt\":\"Say hello in one word.\",\"stream\":false}'
          | grep -o '\"response\":\"[^\"]*\"' &&
        echo '' &&
        echo '3️⃣  OpenAI-compatible endpoint:' &&
        curl -sf http://ollama:11434/v1/chat/completions
          -H 'Content-Type: application/json'
          -d '{\"model\":\"tinyllama\",\"messages\":[{\"role\":\"user\",\"content\":\"Say hi in one word.\"}]}'
          | grep -o '\"content\":\"[^\"]*\"' &&
        echo '' &&
        echo '✅ All Ollama tests passed!'
      "
    profiles:
      - test


# ================================================================
# 💾 Volumes
# ================================================================
volumes:
  ollama-models:
    name: ai-dev-platform-ollama-models
    # Models persist across rebuilds
    # To reset: docker volume rm ai-dev-platform-ollama-models


# ================================================================
# 🌐 Networks
# ================================================================
networks:
  ollama-net:
    name: ai-dev-platform-ollama-net
    driver: bridge
